# Configuración de memoria para Gradle
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+UseParallelGC
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# AndroidX (requerido por Flutter moderno)
android.useAndroidX=true
android.enableJetifier=true

# Eliminar opciones deprecated
# android.enableDexingArtifactTransform.desugaring=true  ← REMOVIDO (ya no existe)
# android.enableR8.fullMode=false  ← REMOVIDO si causa problemas

# Kotlin
kotlin.code.style=official
kotlin.incremental=true
