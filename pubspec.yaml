name: nova_aden
description: Sistema de Gestión Comercial Nova ADEN - Multiplataforma
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Base de datos (compatible con todas las plataformas)
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.3
  
  # UI y utilidades
  intl: ^0.18.1
  provider: ^6.1.1
  
  # Archivos y preferencias (multiplataforma)
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # CSV para exportar/importar
  csv: ^5.1.1
  
  # PDF y impresión (compatibles con Flutter 3.19.0)
  pdf: ^3.10.4
  printing: ^5.11.0
  
  # Compresión de respaldos
  archive: ^3.4.10
  
  # Gráficos para reportes
  fl_chart: ^0.65.0
  
  # Criptografía para validación de respaldos
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
