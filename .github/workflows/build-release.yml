name: 🚀 Build Release APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-release:
    name: Build APK Release
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter (versión correcta)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'  # ✅ Versión compatible con ^3.10.0
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze

      - name: 🔨 Build Release APK
        run: |
          cd android
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          cd ..
          flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-ADEN-release-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: ✅ Build Complete
        run: |
          echo "🎉 Build exitoso!"
          echo "📱 APK lista para descargar"
