name: Build APK (Debug - Compatible)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK Debug (Firma Estándar Android)
        run: flutter build apk --debug --target-platform android-arm64
        
      - name: Verify APK
        run: |
          echo "=== Archivos generados ==="
          ls -lh build/app/outputs/flutter-apk/
          
          if [ -f "build/app/outputs/flutter-apk/app-debug.apk" ]; then
            APK_SIZE=$(stat -c%s build/app/outputs/flutter-apk/app-debug.apk)
            APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
            echo "Tamaño: ${APK_SIZE_MB} MB"
            echo "✅ APK Debug con firma estándar de Android"
          else
            echo "❌ ERROR: APK no encontrada"
            exit 1
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-ADEN-DEBUG
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
          if-no-files-found: error
