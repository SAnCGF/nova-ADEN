name: Build Release APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK Release (UNIVERSAL)
        run: flutter build apk --release --no-tree-shake-icons

      - name: List APK files
        run: |
          echo "=== Archivos en flutter-apk ==="
          ls -lh build/app/outputs/flutter-apk/

      - name: Check APK size
        run: |
          echo "=== Tamaño del APK ==="
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            APK_SIZE=$(stat -c%s build/app/outputs/flutter-apk/app-release.apk)
            APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
            echo "Tamaño: ${APK_SIZE_MB} MB (${APK_SIZE} bytes)"
            if [ $APK_SIZE_MB -lt 20 ]; then
              echo "WARNING: APK parece pequeña (< 20 MB)"
            else
              echo "OK: Tamaño correcto"
            fi
          else
            echo "ERROR: app-release.apk no encontrado"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-ADEN-APK-Release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
