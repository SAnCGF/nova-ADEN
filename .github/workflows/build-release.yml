name: Build Release APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Release APK
        run: |
          cd android
          echo "org.gradle.jvmargs=-Xmx4096m" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          cd ..
          flutter build apk --release --target-platform android-arm64
          
      - name: Verify APK exists and size
        run: |
          echo "=== Files in flutter-apk directory ==="
          ls -lh build/app/outputs/flutter-apk/
          
          echo "=== Checking APK size ==="
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            APK_SIZE=$(stat -c%s build/app/outputs/flutter-apk/app-release.apk)
            APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
            echo "APK Size: ${APK_SIZE_MB} MB (${APK_SIZE} bytes)"
            
            if [ $APK_SIZE_MB -lt 20 ]; then
              echo "WARNING: APK seems small (< 20 MB)"
            else
              echo "OK: APK size looks correct"
            fi
          else
            echo "ERROR: app-release.apk not found!"
            exit 1
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-ADEN-REAL-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
