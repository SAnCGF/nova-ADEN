name: 🚀 Build Release APK

on:
  workflow_dispatch:  # Ejecutar manualmente desde GitHub
  push:
    branches: [ main ]  # Opcional: build automático al hacer push

jobs:
  build-release:
    name: Build APK Release
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze

      - name: 🔨 Build Release APK
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-ADEN-release-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: ✅ Build Complete
        run: |
          echo "🎉 Build exitoso!"
          echo "📱 APK: app-arm64-v8a-release.apk"
          echo "🔑 Licencia dev: NOVA-0778-A026-8D53"
          echo "📥 Descarga desde: Actions → Build Release APK → Artifacts"
