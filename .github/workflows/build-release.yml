name: Build Release APK (Production)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
      
      - name: Configure Gradle
        run: |
          cd android
          echo "org.gradle.jvmargs=-Xmx4096m" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          cd ..
      
      - name: Build APK Release (UNIVERSAL - CON ICONOS)
        run: flutter build apk --release --no-tree-shake-icons --no-tree-shake-icons
      
      - name: Verify APK
        run: |
          echo "=== APKs generadas ==="
          ls -lh build/app/outputs/flutter-apk/
          
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            APK_SIZE=$(stat -c%s build/app/outputs/flutter-apk/app-release.apk)
            APK_SIZE_MB=$((APK_SIZE / 1024 / 1024))
            echo ""
            echo "================================"
            echo "  APK RELEASE GENERADA"
            echo "================================"
            echo "Archivo: app-release.apk"
            echo "Tamaño: ${APK_SIZE_MB} MB"
            echo "================================"
            
            if [ $APK_SIZE_MB -lt 20 ]; then
              echo "⚠️ WARNING: APK parece pequeña"
            else
              echo "✅ OK: Tamaño correcto (20-30 MB)"
            fi
          else
            echo "❌ ERROR: app-release.apk no encontrada"
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-ADEN-RELEASE-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
