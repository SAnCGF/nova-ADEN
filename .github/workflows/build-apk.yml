name: Build APK Debug

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐦 Setup Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: 📦 Dependencies
        run: flutter pub get

      - name: 🔧 Fix Gradle (remove invalid signing)
        run: |
          sed -i '/signingConfig signingConfigs.release/d' android/app/build.gradle || true

      - name: 🛠️ Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: ✅ Done
        run: echo "🎉 APK Debug generada exitosamente"
