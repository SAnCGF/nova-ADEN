name: Build APK Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: |
          cd nova_aden_app
          flutter pub get
      
      - name: Build APK Release
        run: |
          cd nova_aden_app
          flutter build apk --release --no-tree-shake-icons --split-per-abi=false
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-apk
          path: nova_aden_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: nova_aden_app/build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## 🎉 Nova ADEN - ${{ github.ref_name }}
            
            ### ✅ Características:
            - Splash Screen Profesional
            - Inventario (RF 1-5)
            - POS con Pago (RF 12-22)
            - Compras (RF 6-11)
            - Stock Bajo (RF 5)
            
            ### ⚙️ Especificaciones:
            - Android 8.0+ (minSdk 26)
            - Flutter 3.22.0
            - SQLite Offline
            - ~20 MB Universal APK
            
            ### 👨‍💻 Freddy - Tesis Nova ADEN
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
