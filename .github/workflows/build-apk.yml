name: Build Clean Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Generate Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" -noprompt

      - name: Clean Build
        run: flutter clean

      - name: Build Release APK (NO OPTIMIZATIONS)
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-clean-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Show Info
        run: |
          echo "✅ APK generada:"
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          echo ""
          echo "📱 Esta APK debería funcionar SIN cerrarse"
