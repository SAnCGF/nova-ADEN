name: Build APK Release Optimized

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🐦 Setup Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Dependencies
        run: flutter pub get

      - name: 🔧 Create Debug Keystore
        run: |
          mkdir -p /home/runner/.android
          keytool -genkey -v -keystore /home/runner/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt 2>/dev/null || true

      - name: 🛠️ Build Release APK
        run: |
          export GRADLE_OPTS="-Dorg.gradle.daemon=false -Xmx4g"
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            --split-per-abi

      - name: 📊 Show APK sizes
        run: |
          echo "📱 APK Sizes:"
          ls -lh build/app/outputs/flutter-apk/
          echo ""
          echo "💾 Smallest APK:"
          ls -S build/app/outputs/flutter-apk/*.apk | head -1 | xargs du -h

      - name: 📤 Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-release-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: ✅ Done
        run: echo "🎉 APK Release generada exitosamente (< 70 MB)"
