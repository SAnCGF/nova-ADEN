name: Build Universal Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐦 Setup Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: 📦 Dependencies
        run: flutter pub get

      - name: 🛠️ Build Universal Release APK
        run: |
          # Construye UNA sola APK universal (como la Foto 9 que funcionaba)
          # minifyEnabled en build.gradle la dejará en ~45-50MB
          flutter build apk --release --no-tree-shake-icons

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-release-universal
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: ✅ Done
        run: |
          echo "🎉 APK Release Universal generada:"
          ls -lh build/app/outputs/flutter-apk/app-release.apk
