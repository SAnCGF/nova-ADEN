name: Build APK Release Optimized

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.22.0'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🐦 Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-warnings

      - name: 🛠️ Build Optimized APK (Universal)
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/symbols \
            --no-tree-shake-icons \
            --no-shrink
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

      - name: 📊 Show APK info
        run: |
          echo "📱 APK Size Report:"
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          echo ""
          echo "💾 Size: $(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)"
          echo ""
          echo "📦 All artifacts:"
          ls -lh build/app/outputs/flutter-apk/

      - name: 📤 Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-apk-universal
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 🏷️ Create GitHub Release (if tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: "Nova ADEN ${{ github.ref_name }}"
          body: |
            ## Nova ADEN - APK Optimizada Universal
            
            ### ✅ Optimizaciones Aplicadas
            - **Universal**: Todas las arquitecturas (armeabi-v7a, arm64-v8a, x86_64)
            - **Ofuscación**: Código Dart ofuscado (--obfuscate)
            - **Símbolos**: Separados en build/symbols (--split-debug-info)
            - **Íconos**: Todos incluidos (--no-tree-shake-icons) *[solicitado]*
            - **Recursos**: Optimizados con shrinkResources
            - **Código**: Minificado con R8/ProGuard
            
            ### 📋 Especificaciones Técnicas
            | Item | Valor |
            |------|-------|
            | Flutter | ${{ env.FLUTTER_VERSION }} |
            | Android | 8.0+ (minSdk 26) |
            | Arquitectura | Universal APK |
            | Tamaño estimado | ~35-50 MB |
            
            ### 🧪 Módulos Incluidos
            - ✅ Inventario completo (RF 1-5, 23-28)
            - ✅ Compras con proveedor (RF 6-11)
            - ✅ POS/Ventas avanzado (RF 12-22, 52-60)
            - ✅ Reportes con gráficos (RF 29-34, 61-68)
            - ✅ Configuración completa (RF 35-40, 65-66, 71)
            - ✅ Dashboard con indicadores (RF 40)
            - ✅ Backup manual/automático (RF 37-39, 75, 77)
            
            ### 🔗 Enlaces
            - Repositorio: https://github.com/${{ github.repository }}
            - Issues: https://github.com/${{ github.repository }}/issues
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Build Complete
        run: |
          echo "🎉 Build completed successfully!"
          echo "📱 APK: build/app/outputs/flutter-apk/app-release.apk"
          echo "🔗 Release: https://github.com/${{ github.repository }}/releases"
          echo "📊 Actions: https://github.com/${{ github.repository }}/actions"
