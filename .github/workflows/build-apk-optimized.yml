name: Build APK Optimized (Universal)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🐦 Set up Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-warnings

      - name: 🛠️ Build Optimized APK (Universal)
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/symbols \
            --no-tree-shake-icons \
            --no-shrink
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

      - name: 📊 Show APK size
        run: |
          echo "📱 APK Size Report:"
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          du -h build/app/outputs/flutter-apk/app-release.apk
          echo ""
          echo "📦 Build artifacts:"
          ls -lh build/app/outputs/flutter-apk/

      - name: 📤 Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-apk-universal
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 🏷️ Create GitHub Release (if tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: "Nova ADEN ${{ github.ref_name }}"
          body: |
            ## Nova ADEN - APK Optimizada
            
            ✅ Universal (todas las arquitecturas)
            ✅ Código ofuscado (--obfuscate)
            ✅ Símbolos separados (--split-debug-info)
            ✅ Sin tree-shake-icons (--no-tree-shake-icons)
            ✅ Recursos optimizados (shrinkResources)
            ✅ Código minificado (minifyEnabled)
            
            ### Especificaciones
            - Flutter: 3.22.0
            - Android: 8.0+ (minSdk 26)
            - Arquitectura: Universal (armeabi-v7a, arm64-v8a, x86_64)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Build Complete
        run: |
          echo "🎉 Build completed successfully!"
          echo "📱 APK: build/app/outputs/flutter-apk/app-release.apk"
          echo "🔗 Release: https://github.com/${{ github.repository }}/releases"
