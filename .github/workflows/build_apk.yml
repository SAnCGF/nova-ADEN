name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter 3.19.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: |
          flutter build apk --release --split-per-abi \
            --no-tree-shake-icons \
            --dart-define=DART_OBFUSCATION=false
      
      - name: List APK files
        run: |
          echo "=== APKs generados ==="
          ls -lh build/app/outputs/flutter-apk/app-*.apk 2>/dev/null || echo "⚠️ No APKs found"
      
      - name: Upload APK (v4 - actualizado)
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 7
          if-no-files-found: warn
